<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Find Evil — Conversational DFIR Agent</title>
<script src="/static/marked.min.js"></script>
<link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
<header>
  <div class="brand">🛡️ <b>Find Evil</b> — Conversational DFIR Agent</div>
  <div id="status" class="status">checking…</div>
</header>

<main>
  <section id="chat-pane">
    <div id="messages"></div>
    <div id="suggestions">
      <button class="chip">What cases do you have?</button>
      <button class="chip">Summarize the srl2015 investigation.</button>
      <button class="chip">Who is patient zero and how do you know?</button>
      <button class="chip">Score the agent against the oracle.</button>
      <button class="chip">Show the cross-host campaign report.</button>
      <button class="chip">Try to delete the evidence.</button>
    </div>
    <form id="composer">
      <textarea id="input" rows="1" placeholder="Ask the agent… (Shift+Enter for newline)"></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </section>

  <aside id="report-pane">
    <div class="aside-head">
      <span>Evidence panel</span>
      <select id="report-picker"><option value="">— reports & score —</option></select>
    </div>
    <div id="report" class="markdown">
      <p class="muted">Reports, the cross-host campaign view, and the oracle scorecard render
      here. Every claim the agent makes in chat is backed by a <code>provenance_id</code> it
      resolves against the immutable logbook — ask it to prove any finding.</p>
    </div>
  </aside>
</main>

<script src="/static/app.js?v=3"></script>
</body>
</html>
